<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Autolink WebApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;}
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background: #0f172a;
      color: #e5e7eb;
      min-height: 100vh;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      overscroll-behavior: contain;
    }
    h1 { font-size: 22px; margin: 0 0 4px; text-align: center; }
    .subtitle { font-size: 13px; text-align: center; color: #94a3b8; margin-bottom: 16px; line-height: 1.35; }
    .card {
      background: #111827;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      max-width: 760px;
      margin: 0 auto;
    }
    .field { margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 13px; color: #9ca3af; }
    input, select, textarea {
      border-radius: 10px;
      border: 1px solid #374151;
      padding: 8px 10px;
      font-size: 14px;
      background: #020617;
      color: #e5e7eb;
      outline: none;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus { border-color: #38bdf8; }
    textarea { min-height: 90px; resize: vertical; }
    .readonly { background: #020617; color: #9ca3af; }
    .hint { font-size: 12px; color: #94a3b8; line-height: 1.35; margin-top: 4px; }
    .pill { display: inline-block; padding: 6px 10px; border-radius: 999px; background: #0b1226; border: 1px solid #334155; color: #cbd5e1; font-size: 12px; }
    .hidden { display:none; }
    .errorbox{
      margin: 12px auto 0;
      max-width: 760px;
      background:#0b1226;
      border:1px solid #ef4444;
      color:#fecaca;
      border-radius: 14px;
      padding: 10px 12px;
      display:none;
      line-height:1.35;
      font-size:13px;
      white-space: pre-line;
    }
    .req{ color:#fca5a5; margin-left:6px; font-weight:600; }
    button#submitBtn, .menuBtn {
      width: 100%;
      border-radius: 999px;
      border: none;
      padding: 10px 14px;
      font-size: 15px;
      font-weight: 600;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      color: white;
      cursor: pointer;
      margin-top: 12px;
      touch-action: manipulation;
    }
    button#submitBtn:disabled { opacity: .5; cursor: default; }
    .menuGrid {
      display: grid;
      gap: 10px;
    }
    .menuBack {
      background: #1f2937;
    }
  </style>
</head>

<body>
  <h1>Autolink</h1>
  <div class="subtitle" id="subtitle"></div>

  <div class="card" id="formCard"></div>
  <button id="submitBtn" disabled>Отправить</button>
  <div class="errorbox" id="errorBox"></div>

<script>
  const tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
  const urlParams = new URLSearchParams(window.location.search);
  let formType = urlParams.get("type") || "";
  const APP_VERSION = urlParams.get("v") || "1";

  const insideTelegram = !!tg;

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js?v=" + encodeURIComponent(APP_VERSION)).catch(() => {});
    });
  }

  try { if (tg) { tg.ready(); tg.expand(); } } catch (e) {}

  const subtitleEl = document.getElementById("subtitle");
  const formCard = document.getElementById("formCard");
  const submitBtn = document.getElementById("submitBtn");
  const errorBox = document.getElementById("errorBox");

  function showError(msg){
    if (!msg) { errorBox.style.display="none"; errorBox.textContent=""; return; }
    errorBox.textContent = msg;
    errorBox.style.display="block";
    try { errorBox.scrollIntoView({behavior:"smooth", block:"start"}); } catch(e){}
  }

  function tgAlert(text) {
    try {
      if (insideTelegram && typeof tg.showAlert === "function") tg.showAlert(String(text));
      else alert(String(text));
    } catch(e) { alert(String(text)); }
  }

  const FORM_TITLES = {
    mgr_stock: "Сток",
    sale_main: "Продажа",
    sale_deposit: "Задаток",
    deposit_status: "Статус задатка",
    sale_extra: "Доп. услуги",
    fin_auto_template: "Расходы авто РФ",
    fin_company: "Расходы компании",
    fin_other_income: "Прочие доходы",
    refs_manage: "Справочники",
    record_find: "Поиск записи",
    record_edit: "Исправление записи",
  };

  // ---------- refs ----------
  let refs = {
    manager: [],
    source: [],
    owner: [],
    brand_model: [],
    expense_article: [],
    income_article: [],
    vin: []
  };

  function urlList(name){
    const v = urlParams.get(name) || "";
    return v ? v.split("|").filter(Boolean) : [];
  }

  refs.manager = urlList("managers");
  refs.source = urlList("sources");
  refs.owner = urlList("owners");
  refs.brand_model = urlList("brands");
  refs.expense_article = urlList("expense_articles");
  refs.income_article = urlList("income_articles");
  refs.vin = urlList("vins");

  async function loadStandaloneBootstrap(){
    if (insideTelegram || formType) return;
    try{
      const res = await fetch("/api/bootstrap");
      const data = await res.json();
      if (data && data.ok && data.refs) refs = data.refs;
    }catch(e){}
  }

  // ---------- helpers ----------
  function todayISO() { return new Date().toISOString().slice(0, 10); }

  function formatDateToRu(value) {
    if (!value) return "";
    const parts = value.split("-");
    if (parts.length === 3) {
      const [y, m, d] = parts;
      return `${d}.${m}.${y}`;
    }
    return value;
  }

  function getRuDate(id) {
    const el = document.getElementById(id);
    if (!el) return "";
    return formatDateToRu(el.value);
  }

  function showEl(el, show) {
    if (!el) return;
    el.classList.toggle("hidden", !show);
  }

  function safeStr(v){ return (v===null||v===undefined) ? "" : String(v); }

  function normalizeVin(v) {
    return String(v || "").trim().toUpperCase().replace(/\s+/g,"");
  }

  function uniq(arr){
    const out=[]; const seen=new Set();
    (arr||[]).forEach(x=>{
      const s=String(x||"").trim();
      if(!s) return;
      const k=s.toLowerCase();
      if(seen.has(k)) return;
      seen.add(k); out.push(s);
    });
    return out;
  }

  // ---------- localStorage ----------
  const LS_KEYS = {
    MANAGER: "autolink_last_manager",
    SOURCE: "autolink_last_source",
    OWNER: "autolink_last_owner",
    EXPENSE_ARTICLE: "autolink_last_expense_article",
    INCOME_ARTICLE: "autolink_last_income_article",
  };

  function rememberField(id, lsKey) {
    const el = document.getElementById(id);
    if (!el) return;
    try {
      const saved = localStorage.getItem(lsKey);
      if (!el.value && saved) el.value = saved;
    } catch (e) {}
    el.addEventListener("input", () => {
      try { localStorage.setItem(lsKey, el.value || ""); } catch (e) {}
    });
    el.addEventListener("change", () => {
      try { localStorage.setItem(lsKey, el.value || ""); } catch (e) {}
    });
  }

  // ---------- datalist ----------
  function updateDatalist(dlId, options) {
    const dl = document.getElementById(dlId);
    if (!dl) return;
    dl.innerHTML = "";
    (options || []).slice(0, 800).forEach((opt) => {
      const o = document.createElement("option");
      o.value = opt;
      dl.appendChild(o);
    });
  }

  function createInput(id, labelText, placeholder = "", value = "", type = "text", readonly = false, required = false) {
    const w = document.createElement("div");
    w.className = "field";
    const l = document.createElement("label");
    l.htmlFor = id;
    l.textContent = labelText;
    if (required) {
      const r = document.createElement("span");
      r.className = "req";
      r.textContent = "*";
      l.appendChild(r);
    }
    const i = document.createElement("input");
    i.id = id;
    i.placeholder = placeholder;
    i.type = type;
    if (value) i.value = value;
    if (readonly) { i.readOnly = true; i.classList.add("readonly"); }
    if (id.toLowerCase().includes("vin")) i.maxLength = 17;
    if (required) i.dataset.required = "1";
    w.appendChild(l);
    w.appendChild(i);
    return w;
  }

  function createTextarea(id, labelText, placeholder = "", readonly = false, required = false) {
    const w = document.createElement("div");
    w.className = "field";
    const l = document.createElement("label");
    l.htmlFor = id;
    l.textContent = labelText;
    if (required) {
      const r = document.createElement("span");
      r.className = "req";
      r.textContent = "*";
      l.appendChild(r);
    }
    const t = document.createElement("textarea");
    t.id = id;
    t.placeholder = placeholder;
    if (readonly) { t.readOnly = true; t.classList.add("readonly"); }
    if (required) t.dataset.required = "1";
    w.appendChild(l);
    w.appendChild(t);
    return w;
  }

  function createSelectKV(id, labelText, options, placeholder = "Выберите...", required = false) {
    const w = document.createElement("div");
    w.className = "field";
    const l = document.createElement("label");
    l.htmlFor = id;
    l.textContent = labelText;
    if (required) {
      const r = document.createElement("span");
      r.className = "req";
      r.textContent = "*";
      l.appendChild(r);
    }
    const s = document.createElement("select");
    s.id = id;

    const ph = document.createElement("option");
    ph.value = "";
    ph.textContent = placeholder;
    ph.disabled = true;
    ph.selected = true;
    s.appendChild(ph);

    options.forEach((opt) => {
      const o = document.createElement("option");
      o.value = opt.value;
      o.textContent = opt.label;
      s.appendChild(o);
    });

    if (required) s.dataset.required = "1";

    w.appendChild(l);
    w.appendChild(s);
    return w;
  }

  function createAutocompleteInput(id, labelText, placeholder = "", options = [], required = false) {
    const w = document.createElement("div");
    w.className = "field";
    const l = document.createElement("label");
    l.htmlFor = id;
    l.textContent = labelText;
    if (required) {
      const r = document.createElement("span");
      r.className = "req";
      r.textContent = "*";
      l.appendChild(r);
    }
    const i = document.createElement("input");
    i.id = id;
    i.placeholder = placeholder;
    const dlId = id + "_list";
    i.setAttribute("list", dlId);
    let dl = document.getElementById(dlId);
    if (!dl) {
      dl = document.createElement("datalist");
      dl.id = dlId;
      document.body.appendChild(dl);
    }
    updateDatalist(dlId, options);
    if (required) i.dataset.required = "1";
    w.appendChild(l);
    w.appendChild(i);
    return w;
  }

  // ---------- money formatting ----------
  function digitsOnly(s){ return String(s||"").replace(/[^\d]/g, ""); }

  function normalizeMoneyString(raw) {
    let s = String(raw || "").trim();
    if (!s) return "";
    s = s.replace(/\s+/g, "");
    s = s.replace(/[^\d,.\-]/g, "");
    if (!s) return "";

    const isNegative = s.startsWith("-");
    s = s.replace(/\-/g, "");
    if (isNegative) s = "-" + s;
    if (s === "-") return "-";

    const lastComma = s.lastIndexOf(",");
    const lastDot = s.lastIndexOf(".");
    const sepIndex = Math.max(lastComma, lastDot);

    let intPart = s;
    let fracPart = "";
    let hasSeparator = false;

    if (sepIndex !== -1) {
      hasSeparator = true;
      intPart = s.slice(0, sepIndex);
      fracPart = s.slice(sepIndex + 1).replace(/[^\d]/g, "");
    }

    const negative = intPart.startsWith("-");
    intPart = intPart.replace(/[^\d]/g, "");

    if (!intPart && hasSeparator) intPart = "0";
    if (!intPart && !fracPart) return negative ? "-" : "";

    intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, " ");

    let result = (negative ? "-" : "") + intPart;
    if (hasSeparator) result += "," + fracPart;

    return result;
  }

  function setupMoneyInput(id){
    const el = document.getElementById(id);
    if (!el || el.dataset.money === "1") return;
    el.dataset.money = "1";

    const formatNow = () => {
      const raw = el.value;
      const formatted = normalizeMoneyString(raw);
      el.value = (formatted === "-" ? "" : formatted);
    };

    const onInput = () => {
      const raw = el.value;
      if (!String(raw || "").trim()) {
        el.value = "";
        return;
      }

      const start = el.selectionStart || 0;
      const beforeDigits = digitsOnly(raw.slice(0, start)).length;

      const formatted = normalizeMoneyString(raw);
      el.value = (formatted === "-" ? "" : formatted);

      let pos = 0;
      let seenDigits = 0;
      while (pos < el.value.length && seenDigits < beforeDigits) {
        if (/\d/.test(el.value[pos])) seenDigits++;
        pos++;
      }
      try { el.setSelectionRange(pos, pos); } catch(e){}
    };

    el.addEventListener("input", onInput);
    el.addEventListener("blur", formatNow);
  }

  // ---------- VIN autocomplete ----------
  function getAllVins() {
    return uniq((refs.vin || []).map(v => normalizeVin(v)).filter(Boolean));
  }

  function setupVinAutocompleteSmart(inputId) {
    const input = document.getElementById(inputId);
    if (!input) return;
    if (input.dataset && input.dataset.vinAuto === "1") return;
    input.dataset.vinAuto = "1";

    const listId = inputId + "_list";
    let dl = document.getElementById(listId);
    if (!dl) {
      dl = document.createElement("datalist");
      dl.id = listId;
      document.body.appendChild(dl);
    }
    input.setAttribute("list", listId);

    function fill(filter = "") {
      const raw = String(filter || "").trim();
      if (!raw) return;
      const onlyDigits = /^[0-9]+$/.test(raw);
      if (!onlyDigits && raw.length < 2) return;
      const f = raw.toLowerCase();

      dl.innerHTML = "";
      const source = getAllVins();
      const out = [];

      for (let i = 0; i < source.length; i++) {
        const v = normalizeVin(source[i]);
        if (!v) continue;
        if (v.toLowerCase().includes(f)) out.push(v);
        if (out.length >= 80) break;
      }

      out.forEach(v => {
        const o = document.createElement("option");
        o.value = v;
        dl.appendChild(o);
      });
    }

    input.addEventListener("focus", () => fill(input.value));
    input.addEventListener("input", () => fill(input.value));
  }

  // ---------- validation ----------
  function isFieldHidden(el){
    if (!el) return true;
    const field = el.closest(".field");
    if (!field) return false;
    return field.classList.contains("hidden");
  }

  function labelFor(el){
    if (!el || !el.id) return el?.id || "поле";
    const lab = formCard.querySelector(`label[for="${el.id}"]`);
    if (!lab) return el.id;
    return lab.textContent.replace("*","").trim();
  }

  function validateVisibleRequired() {
    const missing = [];
    const controls = formCard.querySelectorAll("input, select, textarea");

    controls.forEach(el=>{
      if (!el.id) return;
      const requiredFlag = el.dataset.required === "1";
      if (!requiredFlag) return;
      if (isFieldHidden(el)) return;
      const v = (el.value || "").trim();
      if (!v) missing.push(labelFor(el));
    });

    if (missing.length) {
      showError("Заполни обязательные поля:\n• " + missing.join("\n• "));
      return false;
    }
    showError("");
    return true;
  }

  function validateSaleScenario(){
    if (formType !== "sale_main") return true;

    const payment = document.getElementById("salePaymentTypeInput")?.value || "";
    const commission = (document.getElementById("saleCommissionInput")?.value || "no") === "yes";
    const vatYes = (document.getElementById("saleVatInput")?.value || "no") === "yes";
    const vat = (payment === "cashless") && vatYes;

    const mustHave = [];
    if (payment === "cash") {
      mustHave.push("priceCashInput");
      if (commission) mustHave.push("priceCashNoCommInput");
    } else if (payment === "cashless") {
      if (vat) {
        mustHave.push("priceNdsInput");
        mustHave.push("markupNdsInput");
        mustHave.push("priceNoVatCashInput");
      } else {
        mustHave.push("priceCashlessInput");
      }
      if (commission) {
        mustHave.push("contractPriceInput");
        mustHave.push("brokerPriceInput");
        mustHave.push("brokerExpenseInput");
      }
    }

    const missing = [];
    mustHave.forEach(id=>{
      const el = document.getElementById(id);
      if (!el) return;
      if (isFieldHidden(el)) return;
      if (!(el.value||"").trim()) missing.push(labelFor(el));
    });

    if (missing.length){
      showError("Заполни обязательные поля по выбранному варианту:\n• " + missing.join("\n• "));
      return false;
    }
    return true;
  }

  function validateBeforeSubmit() {
    if (!validateVisibleRequired()) return false;
    if (!validateSaleScenario()) return false;
    return true;
  }

  // ---------- standalone menus ----------
  function renderHomeMenu(){
    subtitleEl.textContent = "Выбери раздел";
    formCard.innerHTML = `
      <div class="menuGrid">
        <button class="menuBtn" data-open="manager_menu">👔 Менеджер</button>
        <button class="menuBtn" data-open="finance_menu">💰 Финансист</button>
        <button class="menuBtn" data-open="other_menu">⚙️ Прочее</button>
      </div>
    `;
    submitBtn.style.display = "none";

    formCard.querySelectorAll("[data-open]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const x = btn.getAttribute("data-open");
        if (x === "manager_menu") return renderStandaloneManagerMenu();
        if (x === "finance_menu") return renderStandaloneFinanceMenu();
        if (x === "other_menu") return renderStandaloneOtherMenu();
      });
    });
  }

  function renderStandaloneManagerMenu(){
    subtitleEl.textContent = "Менеджер";
    formCard.innerHTML = `
      <div class="menuGrid">
        <button class="menuBtn" data-form="mgr_stock">📦 Сток</button>
        <button class="menuBtn" data-form="sale_main">💵 Продажа</button>
        <button class="menuBtn" data-form="sale_deposit">🤝 Задаток</button>
        <button class="menuBtn" data-form="deposit_status">🟢 Статус задатка</button>
        <button class="menuBtn" data-form="sale_extra">🧩 Доп. услуги</button>
        <button class="menuBtn menuBack" id="backBtn">⬅️ Назад</button>
      </div>
    `;
    submitBtn.style.display = "none";

    formCard.querySelectorAll("[data-form]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        formType = btn.getAttribute("data-form");
        subtitleEl.textContent = "Форма: " + (FORM_TITLES[formType] || formType);
        renderForm();
      });
    });

    document.getElementById("backBtn").addEventListener("click", renderHomeMenu);
  }

  function renderStandaloneFinanceMenu(){
    subtitleEl.textContent = "Финансист";
    formCard.innerHTML = `
      <div class="menuGrid">
        <button class="menuBtn" data-form="fin_auto_template">🚗 Расходы авто РФ</button>
        <button class="menuBtn" data-form="fin_company">🏢 Расходы компании</button>
        <button class="menuBtn" data-form="fin_other_income">➕ Прочие доходы</button>
        <button class="menuBtn menuBack" id="backBtn">⬅️ Назад</button>
      </div>
    `;
    submitBtn.style.display = "none";

    formCard.querySelectorAll("[data-form]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        formType = btn.getAttribute("data-form");
        subtitleEl.textContent = "Форма: " + (FORM_TITLES[formType] || formType);
        renderForm();
      });
    });

    document.getElementById("backBtn").addEventListener("click", renderHomeMenu);
  }

  function renderStandaloneOtherMenu(){
    subtitleEl.textContent = "Прочее";
    formCard.innerHTML = `
      <div class="menuGrid">
        <button class="menuBtn" data-form="refs_manage">📚 Справочники</button>
        <button class="menuBtn" data-form="record_find">🔎 Поиск записи</button>
        <button class="menuBtn" data-form="record_edit">✏️ Исправление записи</button>
        <button class="menuBtn menuBack" id="backBtn">⬅️ Назад</button>
      </div>
    `;
    submitBtn.style.display = "none";

    formCard.querySelectorAll("[data-form]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        formType = btn.getAttribute("data-form");
        subtitleEl.textContent = "Форма: " + (FORM_TITLES[formType] || formType);
        renderForm();
      });
    });

    document.getElementById("backBtn").addEventListener("click", renderHomeMenu);
  }

  // ---------- form render ----------
  function renderForm() {
    formCard.innerHTML = "";
    submitBtn.disabled = true;
    submitBtn.style.display = "block";
    submitBtn.textContent = "Отправить";
    showError("");

    if (formType === "mgr_stock") {
      formCard.appendChild(createSelectKV("dealTypeInput", "Тип сделки", [
        {value:"Склад", label:"Склад"},
        {value:"Поставка", label:"Поставка"},
      ], "Выберите тип сделки", true));

      formCard.appendChild(createAutocompleteInput("managerInput","Менеджер", "Начни вводить", refs.manager, true));
      formCard.appendChild(createAutocompleteInput("ownerInput", "Собственник", "Начни вводить", refs.owner, true));
      formCard.appendChild(createAutocompleteInput("brandModelInput", "Марка / Модель", "Начни вводить", refs.brand_model, true));
      formCard.appendChild(createInput("vinInput", "VIN", "Например: 1457 или полный VIN", "", "text", false, true));
      formCard.appendChild(createInput("configInput", "Комплектация", "", "", "text", false, true));
      formCard.appendChild(createInput("bodyColorInput", "Цвет кузова", "", "", "text", false, true));
      formCard.appendChild(createInput("salonColorInput", "Цвет салона", "", "", "text", false, true));
      formCard.appendChild(createInput("priceInput", "Цена, ₽", "", "", "text", false, true));
      formCard.appendChild(createInput("stockDateInput", "Дата", "", todayISO(), "date", false, true));
      formCard.appendChild(createSelectKV("payTypeInput", "Тип оплаты", [
        {value:"Нал", label:"Нал"},
        {value:"Безнал", label:"Безнал"},
        {value:"НДС", label:"НДС"},
      ], "Выберите тип оплаты", true));
      formCard.appendChild(createInput("clientInput", "Клиент", "", "", "text", false, true));

      setupVinAutocompleteSmart("vinInput");
      setupMoneyInput("priceInput");
      rememberField("managerInput", LS_KEYS.MANAGER);
      rememberField("ownerInput", LS_KEYS.OWNER);

      submitBtn.disabled = false;
      return;
    }

    if (formType === "sale_main") {
      renderSaleMain();
      return;
    }

    if (formType === "sale_deposit") {

    [
      "priceCashInput","priceCashNoCommInput","priceCashlessInput",
      "priceNdsInput","markupNdsInput","priceNoVatCashInput",
      "contractPriceInput","brokerPriceInput","brokerExpenseInput"
    ].forEach(setupMoneyInput);

    function updateSaleMainVisibility() {
      const payment = document.getElementById("salePaymentTypeInput").value || "cash";
      const commission = (document.getElementById("saleCommissionInput").value || "no") === "yes";
      const vatYes = (document.getElementById("saleVatInput").value || "no") === "yes";
      const vat = (payment === "cashless") && vatYes;

      const vatSelect = document.getElementById("saleVatInput");
      if (payment !== "cashless") {
        vatSelect.disabled = true;
        vatSelect.value = "no";
      } else {
        vatSelect.disabled = false;
      }

      showEl(receiverWrap, payment === "cash");

      showEl(priceCashWrap, payment === "cash");
      showEl(priceCashNoCommWrap, payment === "cash" && commission);

      showEl(priceCashlessWrap, payment === "cashless" && !vat);
      showEl(priceNdsWrap, payment === "cashless" && vat);
      showEl(markupNdsWrap, payment === "cashless" && vat);
      showEl(priceNoVatCashWrap, payment === "cashless" && vat);

      showEl(contractPriceWrap, payment === "cashless" && commission);
      showEl(brokerPriceWrap, payment === "cashless" && commission);
      showEl(brokerExpenseWrap, payment === "cashless" && commission);

      if (payment === "cash") {
        showEl(priceCashlessWrap, false);
        showEl(priceNdsWrap, false);
        showEl(markupNdsWrap, false);
        showEl(priceNoVatCashWrap, false);
        showEl(contractPriceWrap, false);
        showEl(brokerPriceWrap, false);
        showEl(brokerExpenseWrap, false);
      }

      let variant = "";
      if (payment === "cash" && !commission) variant = "Нал / без брокера";
      if (payment === "cash" && commission) variant = "Нал / с брокером";
      if (payment === "cashless" && vat && !commission) variant = "Безнал / с НДС / без брокера";
      if (payment === "cashless" && vat && commission) variant = "Безнал / с НДС / с брокером";
      if (payment === "cashless" && !vat && !commission) variant = "Безнал / без НДС / без брокера";
      if (payment === "cashless" && !vat && commission) variant = "Безнал / без НДС / с брокером";

      const badgeEl = document.getElementById("saleVariantBadge");
      if (badgeEl) badgeEl.textContent = "Вариант: " + variant;
    }

    document.getElementById("salePaymentTypeInput").addEventListener("change", updateSaleMainVisibility);
    document.getElementById("saleVatInput").addEventListener("change", updateSaleMainVisibility);
    document.getElementById("saleCommissionInput").addEventListener("change", updateSaleMainVisibility);
    updateSaleMainVisibility();

    setupVinAutocompleteSmart("vinInput");
    rememberField("managerInput", LS_KEYS.MANAGER);
    rememberField("ownerInput", LS_KEYS.OWNER);
    rememberField("leadSourceInput", LS_KEYS.SOURCE);

    submitBtn.disabled = false;
  }

  // ---------- collect ----------
  function collectSaleMain() {
    const payment = document.getElementById("salePaymentTypeInput")?.value || "cash";
    const vatYes = (document.getElementById("saleVatInput")?.value || "no") === "yes";
    const commission = (document.getElementById("saleCommissionInput")?.value || "no") === "yes";
    const vat = (payment === "cashless") && vatYes;

    let price = "";
    if (payment === "cash") {
      price = document.getElementById("priceCashInput")?.value || "";
    } else {
      price = vat ? (document.getElementById("priceNdsInput")?.value || "") : (document.getElementById("priceCashlessInput")?.value || "");
    }

    return {
      action: "create",
      formType,
      manager: document.getElementById("managerInput")?.value || "",
      owner: document.getElementById("ownerInput")?.value || "",
      sale_date: getRuDate("saleDateInput"),
      brand_model: document.getElementById("brandModelInput")?.value || "",
      vin: document.getElementById("vinInput")?.value || "",
      source: document.getElementById("leadSourceInput")?.value || "",
      payment_mode: payment,
      vat_mode: vatYes ? "yes" : "no",
      broker_mode: commission ? "yes" : "no",
      buyer: document.getElementById("buyerInput")?.value || "",
      receiver: document.getElementById("receiverInput")?.value || "",
      price: price,
      price_no_commission: (payment === "cash" && commission) ? (document.getElementById("priceCashNoCommInput")?.value || "") : "",
      contract_price: (payment === "cashless" && commission) ? (document.getElementById("contractPriceInput")?.value || "") : "",
      broker_price: (payment === "cashless" && commission) ? (document.getElementById("brokerPriceInput")?.value || "") : "",
      broker_expense: (payment === "cashless" && commission) ? (document.getElementById("brokerExpenseInput")?.value || "") : "",
      markup_nds: (payment === "cashless" && vat) ? (document.getElementById("markupNdsInput")?.value || "") : "",
      price_no_vat_cash: (payment === "cashless" && vat) ? (document.getElementById("priceNoVatCashInput")?.value || "") : ""
    };
  }

        record_id: document.getElementById("findRecordIdInput")?.value || "",
        vin: document.getElementById("findVinInput")?.value || "",
        buyer: document.getElementById("findBuyerInput")?.value || "",
        date: document.getElementById("findDateInput")?.value || ""
      };
    }

    if (formType === "record_edit") {
      return {
        action: "update_record",
        formType,
        sheet_name: document.getElementById("sheetNameInput")?.value || "",
        record_id: document.getElementById("recordIdInput")?.value || "",
        manager: document.getElementById("editManagerInput")?.value || "",
        owner: document.getElementById("editOwnerInput")?.value || "",
        sale_date: document.getElementById("editSaleDateInput")?.value ? getRuDate("editSaleDateInput") : "",
        stock_date: document.getElementById("editStockDateInput")?.value ? getRuDate("editStockDateInput") : "",
        op_date: document.getElementById("editOpDateInput")?.value ? getRuDate("editOpDateInput") : "",
        brand_model: document.getElementById("editBrandInput")?.value || "",
        vin: document.getElementById("editVinInput")?.value || "",
        source: document.getElementById("editSourceInput")?.value || "",
        buyer: document.getElementById("editBuyerInput")?.value || "",
        receiver: document.getElementById("editReceiverInput")?.value || "",
        price: document.getElementById("editPriceInput")?.value || "",
        deposit_sum: document.getElementById("editDepositInput")?.value || "",
        status: document.getElementById("editStatusInput")?.value || "",
        amount: document.getElementById("editAmountInput")?.value || "",
        expense_article: document.getElementById("editExpenseArticleInput")?.value || "",
        income_article: document.getElementById("editIncomeArticleInput")?.value || "",
        comment: document.getElementById("editCommentInput")?.value || ""
      };
    }

    return { action: "create", formType };
  }

  // ---------- submit ----------
  async function submitStandalone(payload){
    const actor = prompt("Введите имя сотрудника", "") || "Standalone Web";
    payload.actor = actor;

    const res = await fetch("/api/submit", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "Ошибка");
    return data;
  }

  submitBtn.addEventListener("click", async () => {
    try { document.activeElement?.blur?.(); } catch(e) {}
    showError("");

    if (!validateBeforeSubmit()) return;

    const payload = collectFormData();
    const dataStr = JSON.stringify(payload);

    if (dataStr.length > 3800 && insideTelegram) {
      tgAlert("Слишком много текста для Telegram. Сократи комментарии и отправь ещё раз.");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Отправка...";

    try {
      if (insideTelegram && tg?.sendData) {
        tg.sendData(dataStr);
        setTimeout(() => { try { tg.close(); } catch(e) {} }, 650);
      } else {
        const data = await submitStandalone(payload);
        tgAlert(data.message || "Готово");
        submitBtn.disabled = false;
        submitBtn.textContent = "Отправить";
      }
    } catch (e) {
      showError("Не удалось отправить данные. " + (e?.message || ""));
      submitBtn.disabled = false;
      submitBtn.textContent = "Отправить";
    }
  });

  // ---------- init ----------
  (async function init(){
    await loadStandaloneBootstrap();

    if (!formType && !insideTelegram) {
      renderHomeMenu();
      return;
    }

    subtitleEl.textContent = "Форма: " + (FORM_TITLES[formType] || formType);
    renderForm();
  })();
</script>
</body>
</html>
