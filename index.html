<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Autolink</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;}
    body{
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      margin:0;
      padding:16px;
      background:#06153a;
      color:#e5e7eb;
      min-height:100vh;
    }
    h1{font-size:22px;margin:0 0 4px;text-align:center;}
    .subtitle{font-size:13px;text-align:center;color:#9fb0d3;margin-bottom:16px;line-height:1.35;}
    .card{
      background:#0b1c46;
      border-radius:18px;
      padding:16px;
      box-shadow:0 12px 30px rgba(0,0,0,.35);
      max-width:900px;
      margin:0 auto;
    }
    .field{margin-bottom:12px;display:flex;flex-direction:column;gap:4px;}
    label{font-size:13px;color:#b7c2da;}
    input,select,textarea{
      border-radius:10px;
      border:1px solid #31456f;
      padding:10px 12px;
      font-size:14px;
      background:#07122d;
      color:#fff;
      outline:none;
      width:100%;
    }
    input:focus,select:focus,textarea:focus{border-color:#38bdf8;}
    textarea{min-height:90px;resize:vertical;}
    .hint{font-size:12px;color:#92a3c6;line-height:1.35;margin-top:4px;}
    .hidden{display:none;}
    .req{color:#fca5a5;margin-left:6px;font-weight:600;}
    .errorbox{
      margin:12px auto 0;
      max-width:900px;
      background:#1a1630;
      border:1px solid #ef4444;
      color:#fecaca;
      border-radius:14px;
      padding:10px 12px;
      display:none;
      line-height:1.35;
      font-size:13px;
      white-space:pre-line;
    }
    .menuGrid{display:grid;gap:10px;}
    .menuBtn, #submitBtn{
      width:100%;
      border-radius:999px;
      border:none;
      padding:11px 14px;
      font-size:15px;
      font-weight:700;
      background:linear-gradient(135deg,#38bdf8,#6366f1);
      color:#fff;
      cursor:pointer;
      margin-top:10px;
    }
    .menuBack{
      background:#22304f;
    }
    #submitBtn:disabled{opacity:.6;cursor:default;}
    .row2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    @media (max-width: 760px){
      .row2{grid-template-columns:1fr;}
    }
    .previewBox{
      background:#08132f;
      border:1px solid #25385d;
      border-radius:14px;
      padding:10px 12px;
      margin-bottom:12px;
    }
    .previewTitle{
      font-size:13px;
      color:#dbe5ff;
      margin-bottom:6px;
      font-weight:700;
    }
    .previewText{
      font-size:12px;
      color:#9fb0d3;
      line-height:1.45;
      white-space:pre-wrap;
      word-break:break-word;
      max-height:150px;
      overflow:auto;
    }
    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:#091735;
      border:1px solid #2e436e;
      color:#dbe5ff;
      font-size:12px;
    }
  </style>
</head>
<body>
  <h1>Autolink</h1>
  <div class="subtitle" id="subtitle"></div>

  <div class="card" id="formCard"></div>
  <button id="submitBtn" disabled>Отправить</button>
  <div class="errorbox" id="errorBox"></div>

<script>
  const tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
  const insideTelegram = !!tg;
  const urlParams = new URLSearchParams(window.location.search);
  let formType = urlParams.get("type") || "";
  const APP_VERSION = "9";

  try { if (tg) { tg.ready(); tg.expand(); } } catch (e) {}

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js?v=" + APP_VERSION).catch(() => {});
    });
  }

  const subtitleEl = document.getElementById("subtitle");
  const formCard = document.getElementById("formCard");
  const submitBtn = document.getElementById("submitBtn");
  const errorBox = document.getElementById("errorBox");

  const FORM_TITLES = {
    mgr_stock: "Сток",
    sale_main: "Продажа",
    sale_deposit: "Задаток",
    deposit_status: "Статус задатка",
    sale_extra: "Доп. услуги",
    fin_auto_template: "Расходы авто РФ",
    fin_company: "Расходы компании",
    fin_other_income: "Прочие доходы",
    refs_manage: "Справочники",
    record_find: "Поиск записи",
    record_edit: "Исправление записи",
  };

  let refs = {
    manager: [],
    source: [],
    owner: [],
    brand_model: [],
    expense_article: [],
    income_article: [],
    vin: []
  };

  function showError(msg){
    if (!msg) {
      errorBox.style.display = "none";
      errorBox.textContent = "";
      return;
    }
    errorBox.textContent = msg;
    errorBox.style.display = "block";
  }

  function tgAlert(text){
    try{
      if (insideTelegram && tg && typeof tg.showAlert === "function") tg.showAlert(String(text));
      else alert(String(text));
    }catch(e){ alert(String(text)); }
  }

  function safeStr(v){ return (v===null || v===undefined) ? "" : String(v); }
  function norm(v){ return safeStr(v).trim(); }
  function normalizeVin(v){ return safeStr(v).trim().toUpperCase().replace(/\s+/g,""); }

  function uniq(arr){
    const out=[]; const seen=new Set();
    (arr||[]).forEach(x=>{
      const s=norm(x);
      if(!s) return;
      const k=s.toLowerCase();
      if(seen.has(k)) return;
      seen.add(k);
      out.push(s);
    });
    return out;
  }

  function urlList(name){
    const v = urlParams.get(name) || "";
    return v ? v.split("|").filter(Boolean) : [];
  }

  function todayISO() { return new Date().toISOString().slice(0, 10); }

  function formatDateToRu(value){
    if (!value) return "";
    const parts = value.split("-");
    if (parts.length === 3){
      const [y,m,d] = parts;
      return `${d}.${m}.${y}`;
    }
    return value;
  }

  function getRuDate(id){
    const el = document.getElementById(id);
    if (!el) return "";
    return formatDateToRu(el.value);
  }

  function createInput(id, labelText, placeholder="", value="", type="text", readonly=false, required=false){
    const w=document.createElement("div");
    w.className="field";

    const l=document.createElement("label");
    l.htmlFor=id;
    l.textContent=labelText;
    if(required){
      const r=document.createElement("span");
      r.className="req";
      r.textContent="*";
      l.appendChild(r);
    }

    const i=document.createElement("input");
    i.id=id;
    i.type=type;
    i.placeholder=placeholder;
    i.value=value || "";
    if(readonly) i.readOnly=true;
    if(required) i.dataset.required="1";
    if(id.toLowerCase().includes("vin")) i.maxLength=17;

    w.appendChild(l);
    w.appendChild(i);
    return w;
  }

  function createTextarea(id, labelText, placeholder="", readonly=false, required=false){
    const w=document.createElement("div");
    w.className="field";

    const l=document.createElement("label");
    l.htmlFor=id;
    l.textContent=labelText;
    if(required){
      const r=document.createElement("span");
      r.className="req";
      r.textContent="*";
      l.appendChild(r);
    }

    const t=document.createElement("textarea");
    t.id=id;
    t.placeholder=placeholder;
    if(readonly) t.readOnly=true;
    if(required) t.dataset.required="1";

    w.appendChild(l);
    w.appendChild(t);
    return w;
  }

  function createSelectKV(id, labelText, options, placeholder="Выберите...", required=false){
    const w=document.createElement("div");
    w.className="field";

    const l=document.createElement("label");
    l.htmlFor=id;
    l.textContent=labelText;
    if(required){
      const r=document.createElement("span");
      r.className="req";
      r.textContent="*";
      l.appendChild(r);
    }

    const s=document.createElement("select");
    s.id=id;

    const ph=document.createElement("option");
    ph.value="";
    ph.textContent=placeholder;
    ph.disabled=true;
    ph.selected=true;
    s.appendChild(ph);

    options.forEach(opt=>{
      const o=document.createElement("option");
      o.value=opt.value;
      o.textContent=opt.label;
      s.appendChild(o);
    });

    if(required) s.dataset.required="1";

    w.appendChild(l);
    w.appendChild(s);
    return w;
  }

  function updateDatalist(dlId, options){
    const dl=document.getElementById(dlId);
    if(!dl) return;
    dl.innerHTML="";
    (options||[]).slice(0,1500).forEach(opt=>{
      const o=document.createElement("option");
      o.value=opt;
      dl.appendChild(o);
    });
  }

  function createAutocompleteInput(id, labelText, placeholder="", options=[], required=false){
    const w=document.createElement("div");
    w.className="field";

    const l=document.createElement("label");
    l.htmlFor=id;
    l.textContent=labelText;
    if(required){
      const r=document.createElement("span");
      r.className="req";
      r.textContent="*";
      l.appendChild(r);
    }

    const i=document.createElement("input");
    i.id=id;
    i.placeholder=placeholder;

    const dlId=id+"_list";
    i.setAttribute("list", dlId);

    let dl=document.getElementById(dlId);
    if(!dl){
      dl=document.createElement("datalist");
      dl.id=dlId;
      document.body.appendChild(dl);
    }
    updateDatalist(dlId, options);

    if(required) i.dataset.required="1";

    w.appendChild(l);
    w.appendChild(i);
    return w;
  }

  function createPreviewBox(title, arr){
    const box=document.createElement("div");
    box.className="previewBox";

    const t=document.createElement("div");
    t.className="previewTitle";
    t.textContent=title;

    const tx=document.createElement("div");
    tx.className="previewText";
    tx.textContent=(arr && arr.length) ? arr.join(", ") : "Пока пусто";

    box.appendChild(t);
    box.appendChild(tx);
    return box;
  }

  function digitsOnly(s){ return String(s||"").replace(/[^\d]/g, ""); }

  function normalizeMoneyString(raw){
    let s = String(raw || "").trim();
    if (!s) return "";
    s = s.replace(/\s+/g, "");
    s = s.replace(/[^\d,.\-]/g, "");
    if (!s) return "";

    const isNegative = s.startsWith("-");
    s = s.replace(/\-/g, "");
    if (isNegative) s = "-" + s;
    if (s === "-") return "-";

    const lastComma = s.lastIndexOf(",");
    const lastDot = s.lastIndexOf(".");
    const sepIndex = Math.max(lastComma, lastDot);

    let intPart = s;
    let fracPart = "";
    let hasSeparator = false;

    if (sepIndex !== -1){
      hasSeparator = true;
      intPart = s.slice(0, sepIndex);
      fracPart = s.slice(sepIndex + 1).replace(/[^\d]/g, "");
    }

    const negative = intPart.startsWith("-");
    intPart = intPart.replace(/[^\d]/g, "");

    if (!intPart && hasSeparator) intPart = "0";
    if (!intPart && !fracPart) return negative ? "-" : "";

    intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    let result = (negative ? "-" : "") + intPart;
    if (hasSeparator) result += "," + fracPart;

    return result;
  }

  function setupMoneyInput(id){
    const el=document.getElementById(id);
    if(!el || el.dataset.money==="1") return;
    el.dataset.money="1";

    const onInput = () => {
      const raw = el.value;
      if (!String(raw || "").trim()){
        el.value = "";
        return;
      }

      const start = el.selectionStart || 0;
      const beforeDigits = digitsOnly(raw.slice(0, start)).length;

      const formatted = normalizeMoneyString(raw);
      el.value = (formatted === "-" ? "" : formatted);

      let pos = 0;
      let seenDigits = 0;
      while (pos < el.value.length && seenDigits < beforeDigits){
        if (/\d/.test(el.value[pos])) seenDigits++;
        pos++;
      }
      try { el.setSelectionRange(pos, pos); } catch(e){}
    };

    el.addEventListener("input", onInput);
    el.addEventListener("blur", onInput);
  }

  function setupVinAutocompleteSmart(inputId){
    const input=document.getElementById(inputId);
    if(!input) return;

    const listId=inputId+"_list";
    let dl=document.getElementById(listId);
    if(!dl){
      dl=document.createElement("datalist");
      dl.id=listId;
      document.body.appendChild(dl);
    }

    function fill(filter=""){
      const raw = norm(filter);
      if (!raw) return;
      const f = raw.toLowerCase();
      dl.innerHTML = "";

      const out = [];
      for (const v of uniq(refs.vin || [])){
        const vin = normalizeVin(v);
        if (!vin) continue;
        if (vin.toLowerCase().includes(f)){
          out.push(vin);
          if (out.length >= 80) break;
        }
      }

      out.forEach(v=>{
        const o=document.createElement("option");
        o.value=v;
        dl.appendChild(o);
      });
    }

    input.addEventListener("focus", ()=>fill(input.value));
    input.addEventListener("input", ()=>fill(input.value));
  }

  function isFieldHidden(el){
    if(!el) return true;
    const field=el.closest(".field");
    if(!field) return false;
    return field.classList.contains("hidden");
  }

  function labelFor(el){
    if (!el || !el.id) return "поле";
    const lab=formCard.querySelector(`label[for="${el.id}"]`);
    if(!lab) return el.id;
    return lab.textContent.replace("*","").trim();
  }

  function validateVisibleRequired(){
    const missing=[];
    const controls=formCard.querySelectorAll("input, select, textarea");

    controls.forEach(el=>{
      if (!el.id) return;
      if (el.dataset.required !== "1") return;
      if (isFieldHidden(el)) return;
      if (!(el.value || "").trim()) missing.push(labelFor(el));
    });

    if (missing.length){
      showError("Заполни обязательные поля:\n• " + missing.join("\n• "));
      return false;
    }
    showError("");
    return true;
  }

  function validateSaleScenario(){
    if (formType !== "sale_main") return true;

    const payment = document.getElementById("salePaymentTypeInput")?.value || "";
    const commission = (document.getElementById("saleCommissionInput")?.value || "no") === "yes";
    const vatYes = (document.getElementById("saleVatInput")?.value || "no") === "yes";
    const vat = (payment === "cashless") && vatYes;

    const mustHave=[];
    if (payment === "cash"){
      mustHave.push("priceCashInput");
      if (commission) mustHave.push("priceCashNoCommInput");
    } else if (payment === "cashless"){
      if (vat){
        mustHave.push("priceNdsInput");
        mustHave.push("markupNdsInput");
        mustHave.push("priceNoVatCashInput");
      } else {
        mustHave.push("priceCashlessInput");
      }
      if (commission){
        mustHave.push("contractPriceInput");
        mustHave.push("brokerPriceInput");
        mustHave.push("brokerExpenseInput");
      }
    }

    const missing=[];
    mustHave.forEach(id=>{
      const el=document.getElementById(id);
      if(!el) return;
      if(isFieldHidden(el)) return;
      if(!(el.value || "").trim()) missing.push(labelFor(el));
    });

    if(missing.length){
      showError("Заполни обязательные поля по выбранному варианту:\n• " + missing.join("\n• "));
      return false;
    }
    return true;
  }

  function validateBeforeSubmit(){
    if (!validateVisibleRequired()) return false;
    if (!validateSaleScenario()) return false;
    return true;
  }

  async function loadStandaloneBootstrap(){
    try{
      const res = await fetch("/api/bootstrap?ts=" + Date.now(), { cache: "no-store" });
      const data = await res.json();
      if (data && data.ok && data.refs){
        refs = data.refs;
      }
    }catch(e){}
  }

  function renderHomeMenu(){
    subtitleEl.textContent = "Выбери раздел";

    formCard.innerHTML = `
      <div class="menuGrid">
        <button class="menuBtn" data-open="manager_menu">👔 Менеджер</button>
        <button class="menuBtn" data-open="finance_menu">💰 Финансист</button>
        <button class="menuBtn" data-open="other_menu">⚙️ Прочее</button>
      </div>
    `;

    submitBtn.style.display = "none";

    formCard.querySelectorAll("[data-open]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const v = btn.getAttribute("data-open");
        if (v === "manager_menu") renderStandaloneManagerMenu();
        if (v === "finance_menu") renderStandaloneFinanceMenu();
        if (v === "other_menu") renderStandaloneOtherMenu();
      });
    });
  }

  function renderStandaloneManagerMenu(){
    subtitleEl.textContent = "Менеджер";
    formCard.innerHTML = `
      <div class="menuGrid">
        <button class="menuBtn" data-form="mgr_stock">📦 Сток</button>
        <button class="menuBtn" data-form="sale_main">💵 Продажа</button>
        <button class="menuBtn" data-form="sale_deposit">🤝 Задаток</button>
        <button class="menuBtn" data-form="deposit_status">🟢 Статус задатка</button>
        <button class="menuBtn" data-form="sale_extra">🧩 Доп. услуги</button>
        <button class="menuBtn menuBack" id="backBtn">⬅️ Назад</button>
      </div>
    `;
    submitBtn.style.display = "none";

    formCard.querySelectorAll("[data-form]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        formType = btn.getAttribute("data-form");
        subtitleEl.textContent = "Форма: " + (FORM_TITLES[formType] || formType);
        renderForm();
      });
    });

    document.getElementById("backBtn").addEventListener("click", renderHomeMenu);
  }

  function renderStandaloneFinanceMenu(){
    subtitleEl.textContent = "Финансист";
    formCard.innerHTML = `
      <div class="menuGrid">
        <button class="menuBtn" data-form="fin_auto_template">🚗 Расходы авто РФ</button>
        <button class="menuBtn" data-form="fin_company">🏢 Расходы компании</button>
        <button class="menuBtn" data-form="fin_other_income">➕ Прочие доходы</button>
        <button class="menuBtn menuBack" id="backBtn">⬅️ Назад</button>
      </div>
    `;
    submitBtn.style.display = "none";

    formCard.querySelectorAll("[data-form]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        formType = btn.getAttribute("data-form");
        subtitleEl.textContent = "Форма: " + (FORM_TITLES[formType] || formType);
        renderForm();
      });
    });

    document.getElementById("backBtn").addEventListener("click", renderHomeMenu);
  }

  function renderStandaloneOtherMenu(){
    subtitleEl.textContent = "Прочее";
    formCard.innerHTML = `
      <div class="menuGrid">
        <button class="menuBtn" data-form="refs_manage">📚 Справочники</button>
        <button class="menuBtn" data-form="record_find">🔎 Поиск записи</button>
        <button class="menuBtn" data-form="record_edit">✏️ Исправление записи</button>
        <button class="menuBtn menuBack" id="backBtn">⬅️ Назад</button>
      </div>
    `;
    submitBtn.style.display = "none";

    formCard.querySelectorAll("[data-form]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        formType = btn.getAttribute("data-form");
        subtitleEl.textContent = "Форма: " + (FORM_TITLES[formType] || formType);
        renderForm();
      });
    });

    document.getElementById("backBtn").addEventListener("click", renderHomeMenu);
  }

  function renderSaleMain(){
    formCard.innerHTML = "";

    formCard.appendChild(createAutocompleteInput("managerInput","Менеджер","Начни вводить",refs.manager,true));
    formCard.appendChild(createAutocompleteInput("ownerInput","Собственник","Начни вводить",refs.owner,true));

    formCard.appendChild(createSelectKV("salePaymentTypeInput","Оплата",[
      {value:"cash",label:"Нал"},
      {value:"cashless",label:"Безнал"},
    ],"Выберите оплату",true));

    formCard.appendChild(createSelectKV("saleVatInput","НДС",[
      {value:"yes",label:"С НДС"},
      {value:"no",label:"Без НДС"},
    ],"Выберите НДС",true));

    formCard.appendChild(createSelectKV("saleCommissionInput","Комиссия брокера",[
      {value:"yes",label:"Есть"},
      {value:"no",label:"Нет"},
    ],"Выберите",true));

    const badge=document.createElement("div");
    badge.style.marginTop="6px";
    badge.innerHTML=`<span class="pill" id="saleVariantBadge">Вариант: —</span>`;
    formCard.appendChild(badge);

    formCard.appendChild(createInput("saleDateInput","Дата продажи","",todayISO(),"date",false,true));
    formCard.appendChild(createAutocompleteInput("brandModelInput","Марка / Модель","Начни вводить",refs.brand_model,true));
    formCard.appendChild(createInput("vinInput","VIN","Например: 1457 или полный VIN","", "text", false, true));
    formCard.appendChild(createAutocompleteInput("leadSourceInput","Источник","Начни вводить",refs.source,true));
    formCard.appendChild(createInput("buyerInput","Покупатель (необязательно)","","","text",false,false));
    formCard.appendChild(createInput("receiverInput","Получатель (необязательно)","","","text",false,false));

    const priceCashWrap=createInput("priceCashInput","Цена","","","text",false,true);
    const priceCashNoCommWrap=createInput("priceCashNoCommInput","Цена без комиссии","","","text",false,true);
    const priceCashlessWrap=createInput("priceCashlessInput","Цена","","","text",false,true);
    const priceNdsWrap=createInput("priceNdsInput","Цена","","","text",false,true);
    const markupNdsWrap=createInput("markupNdsInput","Наценка НДС(% / руб.)","","","text",false,true);
    const priceNoVatCashWrap=createInput("priceNoVatCashInput","Цена без НДС за наличные","","","text",false,true);
    const contractPriceWrap=createInput("contractPriceInput","Цена в договоре","","","text",false,true);
    const brokerPriceWrap=createInput("brokerPriceInput","Цена без комиссии","","","text",false,true);
    const brokerExpenseWrap=createInput("brokerExpenseInput","Комиссия брокера","","","text",false,true);

    formCard.appendChild(priceCashWrap);
    formCard.appendChild(priceCashNoCommWrap);
    formCard.appendChild(priceCashlessWrap);
    formCard.appendChild(priceNdsWrap);
    formCard.appendChild(markupNdsWrap);
    formCard.appendChild(priceNoVatCashWrap);
    formCard.appendChild(contractPriceWrap);
    formCard.appendChild(brokerPriceWrap);
    formCard.appendChild(brokerExpenseWrap);

    [
      "priceCashInput","priceCashNoCommInput","priceCashlessInput","priceNdsInput",
      "markupNdsInput","priceNoVatCashInput","contractPriceInput","brokerPriceInput","brokerExpenseInput"
    ].forEach(setupMoneyInput);

    function updateSaleMainVisibility(){
      const payment=document.getElementById("salePaymentTypeInput").value || "cash";
      const commission=(document.getElementById("saleCommissionInput").value || "no")==="yes";
      const vatYes=(document.getElementById("saleVatInput").value || "no")==="yes";

  function collectSaleMain(){
    const payment = document.getElementById("salePaymentTypeInput")?.value || "cash";
    const vatYes = (document.getElementById("saleVatInput")?.value || "no") === "yes";
    const commission = (document.getElementById("saleCommissionInput")?.value || "no") === "yes";
    const vat = (payment === "cashless") && vatYes;

    let price = "";
    if (payment === "cash"){
      price = document.getElementById("priceCashInput")?.value || "";
    } else {
      price = vat
        ? (document.getElementById("priceNdsInput")?.value || "")
        : (document.getElementById("priceCashlessInput")?.value || "");

    return {
      action:"create",
      formType,
      manager: document.getElementById("managerInput")?.value || "",
      owner: document.getElementById("ownerInput")?.value || "",

      brand_model: document.getElementById("brandModelInput")?.value || "",

      source: document.getElementById("leadSourceInput")?.value || "",
      payment_mode: payment,
      vat_mode: vatYes ? "yes" : "no",
      broker_mode: commission ? "yes" : "no",

  async function submitStandalone(payload){
    const actor = prompt("Введите имя сотрудника", "") || "Standalone Web";
    payload.actor = actor;

    const res = await fetch("/api/submit", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "Ошибка");
    return data;
  }

    try{
      if (insideTelegram && tg?.sendData){
        tg.sendData(dataStr);
        setTimeout(() => { try { tg.close(); } catch(e){} }, 650);
      } else {
        const data = await submitStandalone(payload);
        tgAlert(data.message || "Готово");
        submitBtn.disabled = false;
        submitBtn.textContent = "Отправить";
      }
    }catch(e){
      showError("Не удалось отправить данные. " + (e?.message || ""));
      submitBtn.disabled = false;
      submitBtn.textContent = "Отправить";
    }
  });

  (async function init(){
    refs.manager = urlList("managers");
    refs.source = urlList("sources");
    refs.owner = urlList("owners");
    refs.brand_model = urlList("brands");
    refs.expense_article = urlList("expense_articles");
    refs.income_article = urlList("income_articles");
    refs.vin = urlList("vins");

    if (!insideTelegram && !formType){
      await loadStandaloneBootstrap();
      renderHomeMenu();
      return;
    }

    subtitleEl.textContent = "Форма: " + (FORM_TITLES[formType] || formType);
    renderForm();
  })();
</script>
</body>
